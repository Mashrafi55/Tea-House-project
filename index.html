<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea House</title>

    <!-- tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- banner section starts here -->
    <header class="mt-[68px]">
      <div
        class="parent-container flex justify-between items-center min-h-[200px] max-w-[1250px] mx-auto min-h"
      >
        <div class="left_div">
          <h1 class="manrope_font text-[80px] font-semibold">
            It's good <br />tea time at The <br />Tea House
          </h1>
          <p class="text-[18px] text-[#777777] my-8">
            Tea and Botanical Solutions Supplier Give Optimum <br />Satisfaction
            To Your Taste Buds.
          </p>
          <button
            class="w-[200px] h-[64px] bg-gradient-to-r from-[#FF8938] to-[#FF0000] text-xl text-white rounded-xl"
          >
            Explore More
            <span><i class="fa-solid fa-arrow-down rotate-230"></i></span>
          </button>
        </div>

        <div class="right_div relative">
          <img src="images/banner.png" class="relative top-[60px]" alt="" />
          <div
            class="rounded-tr-2xl shadow-xl w-[255px] h-[100px] flex items-center absolute left-[100px] top-[450px] bg-white"
          >
            <span class="text-4xl"
              ><i class="fa-solid fa-star text-yellow-400"></i
            ></span>
            <div class="ml-4">
              <p class="text-4xl font-bold">5.00</p>
              <p class="text-[#777777]">Trust Pilot Ratings</p>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
